# =============================================================================
# stack.yml — Kubernetes Pod manifest for the llm-companion stack
#
# Contains (in order):
#   1. PersistentVolumeClaims (ollama-models, open-webui-data, caddy-data)
#   2. ConfigMap with the embedded Caddyfile
#   3. Pod with three containers: ollama, open-webui, caddy
#
# Pod mode (single-pod networking):
#   All three containers share the same network namespace. They communicate
#   via localhost (127.0.0.1), not via DNS names.
#     - Ollama listens on localhost:11434
#     - Open WebUI listens on localhost:3000  (not 8080 — Caddy owns :8080)
#     - Caddy listens on localhost:8080 and is the only container with a
#       hostPort published to the outside world.
#
# PVC behaviour:
#   podman play kube  → creates named Podman volumes (stored in ~/.local/share/
#                        containers/storage/volumes/). No StorageClass needed.
#   k3s / Kubernetes  → PVCs are created in the cluster; a StorageClass (e.g.
#                        local-path) must be configured. No change to this file.
#
# How to update the Caddyfile:
#   Edit the 'Caddyfile' key in the ConfigMap below, then re-apply:
#     podman play kube stack.yml --replace
#   (The Caddyfile in the repo root is the canonical reference — keep them in
#    sync. The embedded copy here is what actually runs.)
#
# How to apply locally (Fedora / rootless Podman):
#   # First-run or after changes:
#   podman play kube ~/.config/containers/systemd/llm-companion-secrets.yml
#   podman play kube ~/.config/containers/systemd/stack.yml --replace
#   # Or let the llm-companion.kube Quadlet manage it via systemd.
# =============================================================================

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-ollama-models
  labels:
    app: llm-companion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-open-webui-data
  labels:
    app: llm-companion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llm-caddy-data
  labels:
    app: llm-companion
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ConfigMap with embedded Caddyfile.
# All addresses use localhost because all containers share the pod network namespace.
# To update: edit the Caddyfile key below and re-run: podman play kube stack.yml --replace
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-companion-config
  labels:
    app: llm-companion
data:
  Caddyfile: |
    {
      # Disable the admin API — not needed for this setup.
      admin off

      # Disable HTTPS redirection — we're on an internal network.
      # Remove this block if you enable TLS below.
      auto_https off
    }

    :8080 {
      # ── TLS (disabled by default) ──────────────────────────────────────
      # Uncomment to enable a self-signed cert (trustable on LAN/VPN):
      # tls internal
      # Uncomment for ACME/Let's Encrypt with a public domain:
      # tls your@email.com

      # ── Ollama API — Bearer token protected ────────────────────────────
      # Prefixed with /ollama/ to avoid conflicting with Open WebUI's own /api/.
      # Clients: use http://<host>:8080/ollama/api/ and /ollama/v1/
      @ollama_api {
        path /ollama/api/* /ollama/v1/*
      }

      handle @ollama_api {
        # Reject requests without the correct Bearer token.
        @unauthorized not header Authorization "Bearer {$OLLAMA_API_KEY}"
        respond @unauthorized "Unauthorized" 401

        # Strip the /ollama prefix before forwarding to Ollama.
        uri strip_prefix /ollama

        # Forward authenticated requests to Ollama (localhost — shared pod network).
        reverse_proxy localhost:11434 {
          # Pass the client's real IP for logging.
          header_up X-Real-IP {remote_host}
          # Strip the Authorization header before forwarding — Ollama
          # doesn't need it and we don't want it in logs.
          header_up -Authorization
        }
      }

      # ── Open WebUI — no extra auth (has its own account system) ────────
      # Open WebUI runs on port 3000 (not 8080) to avoid conflicting with Caddy.
      handle {
        reverse_proxy localhost:3000 {
          header_up X-Real-IP {remote_host}
        }
      }

      # ── Logging ────────────────────────────────────────────────────────
      log {
        output stderr
        format console
        level INFO
      }
    }

---
apiVersion: v1
kind: Pod
metadata:
  name: llm-companion
  labels:
    app: llm-companion
  annotations:
    # Podman rootless extension: map the container user to the host user.
    # This is equivalent to --userns=keep-id in podman run.
    io.podman.annotations.userns: "keep-id"
spec:
  restartPolicy: Always

  containers:
    # ── Ollama ───────────────────────────────────────────────────────────────
    - name: ollama
      image: localhost/ollama-cpu:latest
      env:
        # Listen on all interfaces within the pod network namespace.
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_CONTEXT_LENGTH
          value: "16384"
        - name: OLLAMA_KEEP_ALIVE
          value: "10m"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"
        # Pod mode: containers communicate via localhost, not DNS names.
        - name: OLLAMA_ORIGINS
          value: "http://localhost:8080"
        - name: ANONYMIZED_TELEMETRY
          value: "false"
      livenessProbe:
        exec:
          command:
            - ollama
            - list
        initialDelaySeconds: 10
        periodSeconds: 30
        timeoutSeconds: 10
      securityContext:
        # Drop all capabilities for least-privilege operation.
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: ollama-models
          mountPath: /var/lib/ollama/models

    # ── Open WebUI ───────────────────────────────────────────────────────────
    - name: open-webui
      image: ghcr.io/open-webui/open-webui:latest
      env:
        # Open WebUI binds on port 3000 (not 8080) to avoid conflicting with Caddy.
        - name: PORT
          value: "3000"
        # Pod mode: Ollama is reachable on localhost within the shared network namespace.
        - name: OLLAMA_BASE_URL
          value: "http://localhost:11434"
        - name: ANONYMIZED_TELEMETRY
          value: "false"
        - name: ENABLE_SIGNUP
          value: "true"
        # Secret key for session signing — read from the Kubernetes Secret.
        - name: WEBUI_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: llm-companion-secrets
              key: webui-secret-key
      livenessProbe:
        httpGet:
          path: /health
          port: 3000
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 10
      volumeMounts:
        - name: open-webui-data
          mountPath: /app/backend/data

    # ── Caddy ────────────────────────────────────────────────────────────────
    - name: caddy
      image: docker.io/library/caddy:latest
      env:
        # API key for Ollama Bearer token auth — read from the Kubernetes Secret.
        - name: OLLAMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-companion-secrets
              key: ollama-api-key
      ports:
        # Publish Caddy's port to the host.
        - containerPort: 8080
          hostPort: 8080
          protocol: TCP
      livenessProbe:
        exec:
          command:
            - caddy
            - validate
            - --config
            - /etc/caddy/Caddyfile
        initialDelaySeconds: 5
        periodSeconds: 30
        timeoutSeconds: 10
      # NOTE: No cap-drop: ALL for Caddy.
      # Caddy has cap_net_bind_service as a file capability in the image.
      # Dropping ALL capabilities in a rootless user namespace causes EPERM
      # when Caddy tries to bind privileged ports (even :8080 on some kernels).
      # The securityContext block is intentionally omitted here.
      volumeMounts:
        - name: caddyfile
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
          readOnly: true
        - name: caddy-data
          mountPath: /data

  volumes:
    - name: ollama-models
      persistentVolumeClaim:
        claimName: llm-ollama-models
    - name: open-webui-data
      persistentVolumeClaim:
        claimName: llm-open-webui-data
    - name: caddy-data
      persistentVolumeClaim:
        claimName: llm-caddy-data
    # ConfigMap volume: mounts the embedded Caddyfile into the Caddy container.
    - name: caddyfile
      configMap:
        name: llm-companion-config
        items:
          - key: Caddyfile
            path: Caddyfile
