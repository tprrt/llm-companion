---
- name: Deploy llm-companion stack
  # 'all' works for both remote deployment (inventory groups) and local
  # self-provisioning (ansible-playbook -c local -i "localhost,").
  # To target only a subset: ansible-playbook ... --limit llm_companion
  hosts: all
  gather_facts: true
  roles:
    - common
    - firewall
    - podman
    - llm-stack
