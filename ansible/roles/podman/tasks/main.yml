---
# ── Install Podman and build tools ───────────────────────────────────────────
- name: Install Podman, buildah, and networking tools (RedHat)
  ansible.builtin.dnf:
    name:
      - podman
      - buildah
      - passt
      - slirp4netns
    state: present
  become: true
  when: ansible_os_family == "RedHat"

# ── Install Podman and build tools (Debian) ──────────────────────────────────
# Debian 13 ships Podman 5.x natively; no third-party repository is required.
- name: Install Podman and buildah (Debian)
  ansible.builtin.apt:
    name:
      - podman
      - buildah
      - slirp4netns
      - fuse-overlayfs
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

# ── Debian: cgroupfs manager + overlay storage driver ────────────────────────
# When Podman runs inside cloud-init (no systemd user session), crun tries to
# reach D-Bus for cgroup management and hits a polkit permission error.
# Setting cgroup_manager = "cgroupfs" bypasses D-Bus entirely.
#
# Rootless Podman on Debian defaults to the VFS storage driver, which makes a
# full filesystem copy per layer and rapidly fills the disk. fuse-overlayfs
# provides a proper overlay driver for rootless containers.
- name: Configure Podman engine (Debian)
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/containers/containers.conf"
    content: |
      [engine]
      cgroup_manager = "cgroupfs"
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Configure Podman storage to use fuse-overlayfs (Debian)
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/containers/storage.conf"
    content: |
      [storage]
      driver = "overlay"

      [storage.options.overlay]
      mount_program = "/usr/bin/fuse-overlayfs"
    mode: "0644"
  when: ansible_os_family == "Debian"

# ── SELinux boolean (RedHat only) ─────────────────────────────────────────────
- name: Check SELinux boolean container_manage_cgroup (RedHat)
  ansible.builtin.command:
    cmd: getsebool container_manage_cgroup
  when: ansible_os_family == "RedHat"
  register: podman_sebool_check
  changed_when: false

- name: Enable SELinux boolean container_manage_cgroup (RedHat)
  ansible.builtin.command:
    cmd: setsebool -P container_manage_cgroup on
  become: true
  when: ansible_os_family == "RedHat" and 'on' not in podman_sebool_check.stdout
  changed_when: true

# ── Podman user socket ────────────────────────────────────────────────────────
- name: Enable Podman user socket
  ansible.builtin.systemd:
    name: podman.socket
    scope: user
    state: started
    enabled: true

# ── Build Ollama image ────────────────────────────────────────────────────────
- name: Check if Ollama image already exists
  ansible.builtin.command:
    cmd: podman image exists {{ ollama_image_tag }}
  register: podman_ollama_image_check
  failed_when: false
  changed_when: false

- name: Build Ollama image from project directory
  ansible.builtin.command:
    cmd: podman build --target {{ ollama_build_target }} -t {{ ollama_image_tag }} {{ llm_project_dir }}
  register: podman_ollama_build_result
  changed_when: podman_ollama_build_result.rc == 0
  when: podman_ollama_image_check.rc != 0
