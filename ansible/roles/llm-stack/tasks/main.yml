---
# ── Copy stack manifest ───────────────────────────────────────────────────────
# For ROCm builds, stack-rocm.yml is used as the source (it references
# localhost/ollama-rocm:latest and enables privileged GPU access).
# The destination is always stack.yml so the Quadlet unit needs no change.
- name: Copy stack manifest to ~/.config/containers/systemd/
  ansible.builtin.copy:
    src: "{{ llm_project_dir }}/stack{{ '-rocm' if ollama_build_target == 'rocm' else '' }}.yml"
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/stack.yml"
    remote_src: true
    mode: "0644"

# ── Generate Ollama API key ───────────────────────────────────────────────────
- name: Check if Ollama API key file exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/ollama/api-key.env"
  register: api_key_file

- name: Generate Ollama API key
  when: not api_key_file.stat.exists
  block:
    - name: Generate random hex key
      ansible.builtin.command:
        cmd: openssl rand -hex 24
      register: api_key_raw
      changed_when: false

    - name: Write API key to file
      ansible.builtin.copy:
        content: "OLLAMA_API_KEY=sk-ollama-{{ api_key_raw.stdout }}\n"
        dest: "{{ ansible_user_dir }}/.config/ollama/api-key.env"
        mode: "0600"

# ── Generate WebUI secret key ─────────────────────────────────────────────────
- name: Check if WebUI secret key file exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/ollama/webui-secret.env"
  register: webui_secret_file

- name: Generate WebUI secret key
  when: not webui_secret_file.stat.exists
  block:
    - name: Generate random hex secret
      ansible.builtin.command:
        cmd: openssl rand -hex 32
      register: webui_secret_raw
      changed_when: false

    - name: Write WebUI secret to file
      ansible.builtin.copy:
        content: "WEBUI_SECRET_KEY={{ webui_secret_raw.stdout }}\n"
        dest: "{{ ansible_user_dir }}/.config/ollama/webui-secret.env"
        mode: "0600"

# ── Read secrets from files ───────────────────────────────────────────────────
- name: Read Ollama API key
  ansible.builtin.command:
    cmd: grep OLLAMA_API_KEY {{ ansible_user_dir }}/.config/ollama/api-key.env
  register: api_key_line
  changed_when: false

- name: Parse Ollama API key value
  ansible.builtin.set_fact:
    llm_api_key: "{{ api_key_line.stdout | regex_replace('^OLLAMA_API_KEY=', '') }}"

- name: Read WebUI secret key
  ansible.builtin.command:
    cmd: grep WEBUI_SECRET_KEY {{ ansible_user_dir }}/.config/ollama/webui-secret.env
  register: webui_secret_line
  changed_when: false

- name: Parse WebUI secret key value
  ansible.builtin.set_fact:
    llm_webui_secret: "{{ webui_secret_line.stdout | regex_replace('^WEBUI_SECRET_KEY=', '') }}"

# ── Render and place secrets YAML ─────────────────────────────────────────────
- name: Render secrets YAML from template
  ansible.builtin.template:
    src: secrets.yml.j2
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/llm-companion-secrets.yml"
    mode: "0600"

# ── Apply secrets to Podman ───────────────────────────────────────────────────
# Podman 5.x: `podman play kube` stores each key individually;
# `secretKeyRef` can extract them by name.
- name: Apply secrets YAML to Podman (Podman 5.x)
  ansible.builtin.command:
    cmd: >
      podman play kube
      {{ ansible_user_dir }}/.config/containers/systemd/llm-companion-secrets.yml
      --replace
  register: secrets_apply_result
  changed_when: "'Created' in secrets_apply_result.stdout or secrets_apply_result.rc == 0"
  when: podman_version_major | int >= 5

# Podman 4.3.x (Debian 12): `podman play kube` stores the entire YAML as raw
# bytes. `secretKeyRef` then tries to parse those bytes as JSON and fails.
# Fix: create the secret directly as a JSON object so 4.3.x can extract keys.
# `podman secret create --replace` does not exist in Podman 4.3.x — remove then create.
- name: Remove existing Podman secret if present (Podman 4.x)
  ansible.builtin.command:
    cmd: podman secret rm llm-companion-secrets
  failed_when: false
  changed_when: false
  when: podman_version_major | int < 5

# In Podman 4.3.x, secretKeyRef decodes each value from base64 (Kubernetes
# convention: secret.data values are base64-encoded). Plain text values cause
# "illegal base64 data" errors. Base64-encode the values inside the JSON.
- name: Apply secrets to Podman as JSON (Podman 4.x)
  ansible.builtin.shell: |
    API_KEY_B64=$(printf '%s' "{{ llm_api_key }}" | base64 -w0)
    WEBUI_KEY_B64=$(printf '%s' "{{ llm_webui_secret }}" | base64 -w0)
    printf '{"ollama-api-key":"%s","webui-secret-key":"%s"}' "${API_KEY_B64}" "${WEBUI_KEY_B64}" \
      | podman secret create llm-companion-secrets -
  changed_when: true
  when: podman_version_major | int < 5

# ── Podman 5.x: Quadlet .kube unit ───────────────────────────────────────────
# Used on RedHat/Fedora and on Debian when Podman 5.x is installed via the
# Kubic OBS repository (podman_kubic_repo: true).
- name: Copy llm-companion.kube Quadlet unit (Podman 5.x)
  ansible.builtin.copy:
    src: "{{ llm_project_dir }}/llm-companion.kube"
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/llm-companion.kube"
    remote_src: true
    mode: "0644"
  when: podman_version_major | int >= 5

- name: Reload systemd user daemon (Podman 5.x)
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when: podman_version_major | int >= 5

- name: Enable and start llm-companion Quadlet service (Podman 5.x)
  ansible.builtin.systemd:
    name: llm-companion
    scope: user
    state: started
    enabled: true
  when: podman_version_major | int >= 5

# ── Podman 4.x: plain systemd user service ───────────────────────────────────
# Used on Debian 12 when Podman 4.3.x is installed from the default apt repo
# (podman_kubic_repo: false). Named volumes are NOT preserved across restarts
# due to the "volume already exists" bug. Upgrade to Podman 5.x to fix this.
- name: Create ~/.config/systemd/user directory (Podman 4.x)
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/systemd/user"
    state: directory
    mode: "0755"
  when: podman_version_major | int < 5

# Podman 4.3.x always tries to create named volumes defined as PVCs, even if
# they already exist, and fails with "volume already exists" on --replace and
# on restart. Work-around: stop with --down, prune unused volumes, start fresh.
# NOTE: named volumes do NOT persist across service restarts on Podman 4.3.x.
- name: Write llm-companion systemd user service (Podman 4.x)
  ansible.builtin.copy:
    dest: "{{ ansible_user_dir }}/.config/systemd/user/llm-companion.service"
    mode: "0644"
    content: |
      [Unit]
      Description=llm-companion stack
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      # Podman 4.3.x (Debian 12) always tries to create named volumes defined as
      # PVCs in the YAML, even if they already exist, and fails with "volume
      # already exists". Work around this by pruning unused volumes after --down.
      # NOTE: this means named volumes do NOT persist across service restarts on
      # Podman 4.3.x. Set podman_kubic_repo: true to upgrade to Podman 5.x.
      ExecStartPre=-/usr/bin/podman play kube %h/.config/containers/systemd/stack.yml --down
      ExecStartPre=-/usr/bin/podman volume prune -f
      ExecStart=/usr/bin/podman play kube %h/.config/containers/systemd/stack.yml
      ExecStop=/usr/bin/podman play kube %h/.config/containers/systemd/stack.yml --down

      [Install]
      WantedBy=default.target
  when: podman_version_major | int < 5

- name: Reload systemd user daemon (Podman 4.x)
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  when: podman_version_major | int < 5

- name: Enable and start llm-companion service (Podman 4.x)
  ansible.builtin.systemd:
    name: llm-companion
    scope: user
    state: started
    enabled: true
  when: podman_version_major | int < 5
