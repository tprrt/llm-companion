---
# ── Install helper scripts ────────────────────────────────────────────────────
- name: Create ~/.local/bin directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.local/bin"
    state: directory
    mode: "0755"

- name: Install check-services.sh to ~/.local/bin/
  ansible.builtin.copy:
    src: "{{ llm_project_dir }}/check-services.sh"
    dest: "{{ ansible_user_dir }}/.local/bin/check-services.sh"
    remote_src: true
    mode: "0755"

- name: Install pull-models.sh to ~/.local/bin/
  ansible.builtin.copy:
    src: "{{ llm_project_dir }}/pull-models.sh"
    dest: "{{ ansible_user_dir }}/.local/bin/pull-models.sh"
    remote_src: true
    mode: "0755"

# ── Copy stack manifest ───────────────────────────────────────────────────────
# For ROCm builds, stack-rocm.yml is used as the source (it references
# localhost/ollama-rocm:latest and enables privileged GPU access).
# The destination is always stack.yml so the Quadlet unit needs no change.
- name: Copy stack manifest to ~/.config/containers/systemd/
  ansible.builtin.copy:
    src: "{{ llm_project_dir }}/stack{{ '-rocm' if ollama_build_target == 'rocm' else '' }}.yml"
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/stack.yml"
    remote_src: true
    mode: "0644"

# ── Generate Ollama API key ───────────────────────────────────────────────────
- name: Check if Ollama API key file exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/ollama/api-key.env"
  register: api_key_file

- name: Generate Ollama API key
  when: not api_key_file.stat.exists
  block:
    - name: Generate random hex key
      ansible.builtin.command:
        cmd: openssl rand -hex 24
      register: api_key_raw
      changed_when: false

    - name: Write API key to file
      ansible.builtin.copy:
        content: "OLLAMA_API_KEY=sk-ollama-{{ api_key_raw.stdout }}\n"
        dest: "{{ ansible_user_dir }}/.config/ollama/api-key.env"
        mode: "0600"

# ── Generate WebUI secret key ─────────────────────────────────────────────────
- name: Check if WebUI secret key file exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/ollama/webui-secret.env"
  register: webui_secret_file

- name: Generate WebUI secret key
  when: not webui_secret_file.stat.exists
  block:
    - name: Generate random hex secret
      ansible.builtin.command:
        cmd: openssl rand -hex 32
      register: webui_secret_raw
      changed_when: false

    - name: Write WebUI secret to file
      ansible.builtin.copy:
        content: "WEBUI_SECRET_KEY={{ webui_secret_raw.stdout }}\n"
        dest: "{{ ansible_user_dir }}/.config/ollama/webui-secret.env"
        mode: "0600"

# ── Generate Open Terminal API key ───────────────────────────────────────────
- name: Check if Open Terminal API key file exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/ollama/open-terminal-api-key.env"
  register: open_terminal_key_file

- name: Generate Open Terminal API key
  when: not open_terminal_key_file.stat.exists
  block:
    - name: Generate random hex key
      ansible.builtin.command:
        cmd: openssl rand -hex 24
      register: open_terminal_key_raw
      changed_when: false

    - name: Write Open Terminal API key to file
      ansible.builtin.copy:
        content: "OPEN_TERMINAL_API_KEY=sk-terminal-{{ open_terminal_key_raw.stdout }}\n"
        dest: "{{ ansible_user_dir }}/.config/ollama/open-terminal-api-key.env"
        mode: "0600"

# ── Read secrets from files ───────────────────────────────────────────────────
- name: Read Ollama API key
  ansible.builtin.command:
    cmd: grep OLLAMA_API_KEY "{{ ansible_user_dir }}/.config/ollama/api-key.env"
  register: api_key_line
  changed_when: false

- name: Parse Ollama API key value
  ansible.builtin.set_fact:
    llm_api_key: "{{ api_key_line.stdout | regex_replace('^OLLAMA_API_KEY=', '') }}"

- name: Read WebUI secret key
  ansible.builtin.command:
    cmd: grep WEBUI_SECRET_KEY "{{ ansible_user_dir }}/.config/ollama/webui-secret.env"
  register: webui_secret_line
  changed_when: false

- name: Parse WebUI secret key value
  ansible.builtin.set_fact:
    llm_webui_secret: "{{ webui_secret_line.stdout | regex_replace('^WEBUI_SECRET_KEY=', '') }}"

- name: Read Open Terminal API key
  ansible.builtin.command:
    cmd: grep OPEN_TERMINAL_API_KEY "{{ ansible_user_dir }}/.config/ollama/open-terminal-api-key.env"
  register: open_terminal_key_line
  changed_when: false

- name: Parse Open Terminal API key value
  ansible.builtin.set_fact:
    llm_open_terminal_key: "{{ open_terminal_key_line.stdout | regex_replace('^OPEN_TERMINAL_API_KEY=', '') }}"

# ── Render and place secrets YAML ─────────────────────────────────────────────
- name: Render secrets YAML from template
  ansible.builtin.template:
    src: secrets.yml.j2
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/llm-companion-secrets.yml"
    mode: "0600"

# ── Apply secrets to Podman ───────────────────────────────────────────────────
# `podman play kube` stores each key individually; `secretKeyRef` extracts them by name.
- name: Apply secrets YAML to Podman
  ansible.builtin.command:
    cmd: >
      podman play kube
      {{ ansible_user_dir }}/.config/containers/systemd/llm-companion-secrets.yml
      --replace
  register: secrets_apply_result
  changed_when: "'Created' in secrets_apply_result.stdout"

# ── Quadlet .kube unit ────────────────────────────────────────────────────────
- name: Copy llm-companion.kube Quadlet unit
  ansible.builtin.copy:
    src: "{{ llm_project_dir }}/llm-companion.kube"
    dest: "{{ ansible_user_dir }}/.config/containers/systemd/llm-companion.kube"
    remote_src: true
    mode: "0644"

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: Enable llm-companion Quadlet service
  ansible.builtin.systemd:
    name: llm-companion
    scope: user
    # Do not start here: cloud-init reboots immediately after this playbook runs.
    # Starting now lets Open WebUI begin SQLite migrations, which auto-commit
    # each ALTER TABLE statement individually.  If the reboot kills the process
    # mid-migration the partial schema changes persist but alembic_version rolls
    # back, causing every subsequent startup to fail on "duplicate column".
    # Enabling without starting means the service starts cleanly on the first
    # post-reboot boot and migrations complete uninterrupted.
    enabled: true

# ── Pull models (optional) ────────────────────────────────────────────────────
# Only runs when llm_pull_models: true. Skip on cloud-init first-boot runs
# (reboot would interrupt a multi-GB download). Safe to use on subsequent
# re-provisioning runs where the reboot is deferred or not needed.
- name: Pull Ollama models
  when: llm_pull_models | default(false)
  block:
    - name: Start llm-companion service
      ansible.builtin.systemd:
        name: llm-companion
        scope: user
        state: started

    - name: Wait for Ollama to be ready
      ansible.builtin.uri:
        url: "http://localhost:11434/"
        status_code: 200
      register: ollama_ready
      retries: 30
      delay: 5
      until: ollama_ready.status == 200

    - name: Run pull-models.sh
      ansible.builtin.command:
        cmd: "{{ ansible_user_dir }}/.local/bin/pull-models.sh --yes"
      changed_when: true
